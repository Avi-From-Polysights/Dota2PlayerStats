name: Deploy GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          VERSION=$(grep 'APP_VERSION' js/version.js | sed 's/.*"\(.*\)".*/\1/')
          mkdir -p _site
          sed "s/__VERSION__/${VERSION}/g" index.html > _site/index.html
          cp .nojekyll _site/
          cp -r css js _site/
          test -f _site/css/changelog.css

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
