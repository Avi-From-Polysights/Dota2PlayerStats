name: Deploy GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          VERSION=$(grep 'APP_VERSION' js/version.js | sed 's/.*"\(.*\)".*/\1/')
          mkdir -p _site
          sed "s/__VERSION__/${VERSION}/g" index.html > _site/index.html
          cp .nojekyll _site/
          cp -r css js _site/

      - name: Publish to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: _site
          clean: true
          single-commit: true
